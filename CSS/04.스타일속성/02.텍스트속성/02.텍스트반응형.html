<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>반응형 텍스트 예시</title>
    <style>
        h1 {
            /* clmp( 최소값, 선호값 , 최대값 ) */
            font-size: clamp(12px, 5vw, 60px); /* 반응형 텍스트 */
            text-align: center;
        }

        .point {
            /* calc ( 값을 계산 ) : +,-,*,/ 로 계산한 최종값을 알려준다. */
            font-size: calc(1rem + 2vw); /* 기본 글꼴 크기에서 뷰포트 너비의 2% 추가 */
        }

        p {
            font-size: 1.5rem;
        }

        @media (max-width : 768px) {
        p {
            font-size: 1.25rem;
        }
    }

        @media (max-width: 480px) {
        p {
            font-size: 1rem;
        }
    }
    </style>
</head>
<body>
    <h1>반응형 텍스트 예시</h1>
    <h3 class="point">포인트 텍스트입니다.</h3>
    <p>이 텍스트는 화면 크기에 따라 크기가 조정됩니다</p>
</body>
</html>
